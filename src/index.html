<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Screenplay Cards</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;height:100vh;overflow:hidden;display:flex;flex-direction:column;padding:0 1.5rem}
.pbar{display:flex;flex-direction:column;gap:0;margin-bottom:12px;flex-shrink:0}
.proj-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:8px;margin-bottom:8px;border-bottom:0.5px solid #d3d1c7;gap:12px;min-height:28px;flex-wrap:wrap}
.proj-name{font-size:13px;font-weight:600;color:#1a1a18;letter-spacing:-0.01em;white-space:nowrap}
.proj-name.unsaved{color:#888780;font-style:italic}
.proj-center{display:flex;flex-direction:column;align-items:flex-start;flex-shrink:0}
.proj-lastsaved{font-size:10px;color:#b4b2a9;margin-top:1px;white-space:nowrap}
.proj-writer-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.proj-writer-lbl{font-size:11px;color:#888780;white-space:nowrap}
.proj-writer-inp{font-size:12px;color:#1a1a18;border:none;border-bottom:0.5px solid transparent;background:transparent;font-family:inherit;padding:1px 2px;min-width:120px;max-width:220px;outline:none;-webkit-app-region:no-drag}
.proj-writer-inp:focus{border-bottom-color:#b4b2a9}
.proj-writer-inp::placeholder{color:#b4b2a9}
.board-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.ptab{font-size:12px;padding:4px 8px;border:0.5px solid #d3d1c7;border-radius:8px;background:transparent;color:#5f5e5a;cursor:pointer;display:flex;align-items:center;gap:5px;-webkit-app-region:no-drag}
.ptab:hover{background:#ece9e3}
.ptab.active{background:#fff;color:#1a1a18;border-color:#b4b2a9;font-weight:500}
.ptab-name{outline:none;cursor:inherit;min-width:30px}
.ptab-x{font-size:10px;color:#b4b2a9;cursor:pointer;line-height:1}
.ptab-x:hover{color:#a32d2d}
.padd{font-size:12px;padding:4px 10px;border:0.5px solid #d3d1c7;border-radius:8px;background:transparent;color:#b4b2a9;cursor:pointer;-webkit-app-region:no-drag}
.padd:hover{background:#ece9e3;color:#1a1a18}
.tbar{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap;-webkit-app-region:drag}
button{font-family:inherit;font-size:13px;padding:5px 12px;border:0.5px solid #b4b2a9;border-radius:8px;background:#fff;color:#1a1a18;cursor:pointer;-webkit-app-region:no-drag}
button:hover{background:#f1efe8}
.vtog{display:flex;border:0.5px solid #b4b2a9;border-radius:8px;overflow:hidden}
.vtog button{border:none;border-radius:0;padding:5px 12px;font-size:12px;background:transparent}
.vtog button.on{background:#e8e6e0}
.tbtn-on{background:#e8e6e0!important;font-weight:500}
.astrip{margin-bottom:10px;padding:8px 12px;border:0.5px solid #b4b2a9;border-radius:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#ece9e3}
.actbtn{font-size:12px;padding:4px 10px;border:0.5px solid #b4b2a9;border-radius:20px;background:transparent;color:#5f5e5a;cursor:pointer;font-family:inherit}
.actbtn:hover{background:#ece9e3;color:#1a1a18}
.actbtn.on{background:#1a1a18;color:#f5f4f0;border-color:#1a1a18}
.astrip.warn{background:#fcebeb;border-color:#f09595}
.astrip button{font-size:12px;padding:3px 10px}
.astrip button.dbtn{background:#fcebeb;color:#a32d2d;border-color:#f09595}
.astrip button.dbtn:hover{background:#f7c1c1}
.sl{font-size:13px;color:#1a1a18;flex-shrink:0}
.sl.d{color:#a32d2d}
.csw{width:18px;height:18px;border-radius:50%;cursor:pointer;flex-shrink:0;display:inline-block;border:1.5px solid transparent;transition:transform 0.1s}
.csw:hover{transform:scale(1.2)}
.ctr{font-size:12px;color:#888780;margin-left:auto;align-self:center}
.sdot{width:6px;height:6px;border-radius:50%;background:#3b6d11;display:inline-block;margin-right:4px;opacity:0;transition:opacity 0.3s}
.sdot.on{opacity:1}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));grid-auto-rows:160px;gap:12px;align-items:start}
.clist{display:flex;flex-direction:column;gap:8px}
.cwrap{perspective:900px;height:160px;cursor:grab;user-select:none}
.cwrap.dragging{opacity:0.4}
.cwrap.drag-over{outline:2px solid #378add}
.color-bar{position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:12px 0 0 12px;display:flex;flex-direction:column;overflow:hidden;z-index:1}
.ci{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform 0.4s ease}
.cwrap.flipped .ci{transform:rotateY(180deg)}
.cf{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;padding:10px 12px;display:flex;flex-direction:column;overflow:hidden}
.cf.bk{transform:rotateY(180deg);background:#f5f4f0}
.sn{font-size:11px;color:#888780;font-weight:500;letter-spacing:0.05em;margin-bottom:3px;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.cdot{width:9px;height:9px;border-radius:50%;cursor:pointer;background:#e8e6e0;border:1px solid #b4b2a9;flex-shrink:0;display:inline-block}
.fsdot{display:flex;align-items:center;gap:0px;border-radius:5px;overflow:hidden;flex-shrink:0;height:16px;cursor:default;user-select:none}
.fsdot-btn{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;color:#888780;background:rgba(0,0,0,0.05);border:none;padding:0;font-family:inherit;line-height:1}
.fsdot-btn:hover{background:rgba(0,0,0,0.12);color:#1a1a18}
.fsdot-num{font-size:10px;color:#888780;padding:0 3px;line-height:16px;min-width:18px;text-align:center}
.cdot:hover{transform:scale(1.3)}
.st{font-weight:500;color:#1a1a18;flex:1;word-break:break-word;line-height:1.35;outline:none;overflow:hidden;user-select:text;cursor:text;caret-color:currentColor}
.cf .st{display:flex;align-items:center;justify-content:center;text-align:center;}
.sntog{cursor:pointer;border-radius:4px;padding:0 2px;margin:-0 -2px;transition:opacity 0.15s}
.sntog:hover{opacity:0.6}
.sntog.excluded{opacity:0.35;text-decoration:line-through;letter-spacing:0}
.st:focus{border-bottom:1px solid #b4b2a9}
.st:empty::before{content:'untitled';color:#b4b2a9;font-style:italic;font-weight:400;pointer-events:none}
.bl{font-size:10px;color:#888780;letter-spacing:0.05em;margin-bottom:3px;flex-shrink:0}
.bn{font-size:12px;color:#5f5e5a;flex:1;overflow-y:auto;word-break:break-word;line-height:1.6;outline:none;user-select:text;cursor:text;caret-color:currentColor}
.bn:empty::before{content:'notes…';color:#b4b2a9;font-style:italic;pointer-events:none}
.bn:focus{border-bottom:1px solid #b4b2a9}

.ca{display:flex;gap:3px;align-items:center;margin-top:5px;flex-shrink:0;opacity:0;transition:opacity 0.15s}
.cwrap:hover .ca{opacity:1}
.ca button{font-size:11px;padding:2px 6px;background:transparent;color:#888780;user-select:none}
.ca button:hover{background:#f1efe8;color:#1a1a18}
.ca button.xb:hover{background:#fcebeb;color:#a32d2d;border-color:#f09595}

.lrow{display:flex;gap:12px;align-items:stretch;cursor:grab;user-select:none}
.lrow.dragging{opacity:0.4}
.lrow.drag-over{outline:2px solid #378add}
.lnum{font-size:12px;color:#888780;width:28px;padding-top:14px;flex-shrink:0;text-align:right;font-weight:500}
.lf{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;padding:10px 12px;display:flex;flex-direction:column;min-height:60px;flex:1;position:relative;overflow:hidden}

<body>
<div id="pbar" class="pbar"></div>
<div id="tbar" class="tbar"></div>
<div id="sw"></div>
<div id="workspace"><div id="board"></div><div id="limbo-panel"></div></div>
<div id="welcome-overlay" class="hidden"><div id="welcome-panel"></div></div>
<script>

function buildSaveData(){
  return {
    version:'2.0',
    writer,
    curB,
    boards: boards.map(b=>({
      id:b.id,
      name:b.name,
      cards:byB[b.id]||[],
      legend:legByB[b.id]||{},
      limbo:limboByB[b.id]||[],
    })),
    nid,
    savedAt:new Date().toISOString(),
  };
}

function loadFromData(data){
  // Migrate old single-board format (version 1.0)
  if(!data.boards){
    const projId='p1';
    boards=[{id:projId,name:data.name||'Board 1'}];
    curB=projId;
    byB={[projId]:data.cards||[]};
    legByB={[projId]:data.legend||{}};
    limboByB={[projId]:data.limbo||[]};
    nid=data.nid||((data.cards||[]).length+1);
    writer=data.writer||'';
  } else {
    // New multi-board format (version 2.0)
    boards=data.boards.map(b=>({id:b.id,name:b.name}));
    curB=data.curB||data.boards[0].id;
    byB={};legByB={};limboByB={};
    data.boards.forEach(b=>{
      byB[b.id]=b.cards||[];
      legByB[b.id]=b.legend||{};
      limboByB[b.id]=b.limbo||[];
    });
    nid=data.nid||1;
    writer=data.writer||'';
  }
  hist=[];actFilter.clear();colorSpot.clear();cpPanel=null;cpId=null;collapsedActs.clear();selectedCards.clear();selMode=false;linkHighlight=null;
  Object.values(byB).forEach(arr=>{if(Array.isArray(arr))arr.forEach(migrateColors);});
  lastSavedAt=data.savedAt||null;
  isDirty=false;
  updateWindowMeta();
  render();
}

function updateWindowMeta(){
  if(!window.electronAPI)return;
  const board=boards.find(b=>b.id===curB);
  const name=board?board.name:'Untitled';
  window.electronAPI.setTitle(name);
  window.electronAPI.setEdited(isDirty);
}

async function handleSave(){
  if(!window.electronAPI)return;
  const data=buildSaveData();
  if(currentFilePath){
    const r=await window.electronAPI.fileSave(data,currentFilePath);
    if(r&&r.success){lastSavedAt=new Date().toISOString();isDirty=false;updateWindowMeta();renderPbar();}
    return r;
  }
  return handleSaveAs();
}

async function handleSaveAs(){
  if(!window.electronAPI)return;
  const data=buildSaveData();
  const r=await window.electronAPI.fileSaveAs(data);
  if(r&&r.success){
    currentFilePath=r.filePath;
    lastSavedAt=new Date().toISOString();isDirty=false;
    updateWindowMeta();
    renderPbar();
  }
  return r;
}

function checkDirtyThen(action){
  if(!isDirty){action();return;}
  const board=boards.find(b=>b.id===curB);
  const name=(board&&board.name)||'Untitled';
  if(confirm('Save changes to "'+name+'" before continuing?')){
    handleSave().then(r=>{if(r&&(r.success||r.cancelled))action();});
  } else {
    action();
  }
}


const COLORS=[
  {k:'none',h:null},{k:'red',h:'#E24B4A'},{k:'coral',h:'#D85A30'},
  {k:'amber',h:'#EF9F27'},{k:'yellow',h:'#d4a500'},{k:'lime',h:'#639922'},
  {k:'teal',h:'#1D9E75'},{k:'sky',h:'#378ADD'},{k:'indigo',h:'#534AB7'},
  {k:'violet',h:'#7F77DD'},{k:'pink',h:'#D4537E'},{k:'gray',h:'#888780'}
];

const isActHeader=c=>c.nocount&&/act/i.test(c.title||'');

const getActSectionsForBoard=(bid)=>{
  const sections=[];

  (byB[bid]||[]).forEach(c=>{
    if(isActHeader(c)){cur={label:(c.title||'').trim(),ids:new Set([c.id])};sections.push(cur);}
    else if(cur){cur.ids.add(c.id);}

  return sections;
};
const L=()=>legByB[curB]||(legByB[curB]={});
const cHex=k=>(COLORS.find(c=>c.k===k)||{}).h||null;
const textColor=hex=>{if(!hex)return null;const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)/255<0.55?'#f5f4f0':'#1a1a18';};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const getFS=c=>(c.fs||14)+'px';
const colorDotStyle=colors=>{
  if(!colors||!colors.length)return'';
  if(colors.length===1)return`background:${cHex(colors[0])};border:none;`;
  const pct=100/colors.length;
  const stops=colors.map((k,i)=>`${cHex(k)} ${(i*pct).toFixed(1)}% ${((i+1)*pct).toFixed(1)}%`).join(',');
  return`background:conic-gradient(${stops});border:none;`;
};
const makeColorBar=colors=>{
  if(!colors||!colors.length)return'';

  return`<div class="color-bar">${vis.map(k=>`<span style="background:${cHex(k)};flex:1;display:block"></span>`).join('')}</div>`;
};
const migrateColors=c=>{if(!c.colors)c.colors=(c.color&&c.color!=='none')?[c.color]:[];};

function sched(){

function pushH(){hist.push({board:curB,snap:JSON.stringify(C())});if(hist.length>30)hist.shift();redoHist=[];}

function pushCH(id){
  const c=C().find(x=>x.id===id);if(!c)return;
  if(!cardHist[id])cardHist[id]=[];
  const last=cardHist[id][cardHist[id].length-1];
  const snap={title:c.title,notes:c.notes};
  if(last&&last.title===snap.title&&last.notes===snap.notes)return;
  cardHist[id].push(snap);if(cardHist[id].length>50)cardHist[id].shift();
  if(!cardRedo[id])cardRedo[id]=[];cardRedo[id]=[];
}

function undo(){
  const ae=document.activeElement;
  if(ae&&(ae.classList.contains('st')||ae.classList.contains('bn'))){
    const id=parseInt(ae.dataset.id);
    if(!cardHist[id]||!cardHist[id].length)return;
    const c=C().find(x=>x.id===id);if(!c)return;
    if(!cardRedo[id])cardRedo[id]=[];
    cardRedo[id].push({title:c.title,notes:c.notes});
    const snap=cardHist[id].pop();
    c.title=snap.title;c.notes=snap.notes;
    const st=document.querySelector('.st[data-id="'+id+'"]');
    const bn=document.querySelector('.bn[data-id="'+id+'"]');
    if(st)st.innerText=c.title;if(bn)bn.innerHTML=c.notes;
    sched();return;
  }
  for(let i=hist.length-1;i>=0;i--){
    if(hist[i].board===curB){
      redoHist.push({board:curB,snap:JSON.stringify(C())});
      byB[curB]=JSON.parse(hist[i].snap);hist.splice(i,1);sched();pend=null;cpId=null;render();return;
    }
  }
}

function redo(){
  const ae=document.activeElement;
  if(ae&&(ae.classList.contains('st')||ae.classList.contains('bn'))){
    const id=parseInt(ae.dataset.id);
    if(!cardRedo[id]||!cardRedo[id].length)return;
    const c=C().find(x=>x.id===id);if(!c)return;
    if(!cardHist[id])cardHist[id]=[];
    cardHist[id].push({title:c.title,notes:c.notes});
    const snap=cardRedo[id].pop();
    c.title=snap.title;c.notes=snap.notes;
    const st=document.querySelector('.st[data-id="'+id+'"]');
    const bn=document.querySelector('.bn[data-id="'+id+'"]');
    if(st)st.innerText=c.title;if(bn)bn.innerHTML=c.notes;
    sched();return;
  }
  if(!redoHist.length)return;
  const last=redoHist.pop();

    hist.push({board:curB,snap:JSON.stringify(C())});

}

function toggleLink(cardId,targetId){
  const a=C().find(x=>x.id===cardId);
  const b=C().find(x=>x.id===targetId);
  if(!a||!b)return;
  if(!a.links)a.links=[];
  if(!b.links)b.links=[];
  const linked=a.links.includes(targetId);
  if(linked){
    a.links=a.links.filter(id=>id!==targetId);
    b.links=b.links.filter(id=>id!==cardId);
  } else {
    a.links.push(targetId);
    b.links.push(cardId);
  }
  sched();renderBoard();renderSW();
}

  setTimeout(()=>{
    const el=document.querySelector(`.st[data-id="${nc.id}"]`);
    if(el){el.focus();const r=document.createRange();r.selectNodeContents(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);}
  },50);
}

function reqDel(cardId){
  const c=C().find(x=>x.id===cardId);
  pendPrint=null;pendBoard=false;selMode=false;selectedCards.clear();
  pend={type:'card',cardId,label:c?c.title||'untitled':'untitled'};
  cpId=null;renderSW();
}

function doDel(){
  if(!pend||pend.type!=='card')return;
  const i=C().findIndex(c=>c.id===pend.cardId);
  if(i===-1){pend=null;renderSW();return;}
  pushH();C().splice(i,1);pend=null;sched();renderBoard();renderTbar();renderSW();
}

function openCP(cardId,mode){
  const m=mode||'border';
  if(cpPanel===m&&cpId===cardId){cpPanel=null;cpId=null;const hadSpot=colorSpot.size>0;colorSpot.clear();renderSW();renderTbar();if(hadSpot)renderBoard();return;}
  pendPrint=null;pendBoard=false;cpPanel=m;cpId=cardId;pend=null;renderSW();
}
function toggleColor(cardId,k){
  const c=C().find(x=>x.id===cardId);if(!c)return;
  if(!c.colors)c.colors=[];
  pushH();
  if(k==='none'){c.colors=[];}
  else{c.colors=[k];}
  sched();renderBoard();renderSW();
}
function setBgColor(cardId,k){
  const c=C().find(x=>x.id===cardId);if(!c)return;
  pushH();c.bgColor=(k==='none'?null:k);sched();renderBoard();renderSW();
}
function cancel(){const hadSpot=colorSpot.size>0;const hadLink=linkHighlight!==null;pend=null;pendBoard=false;pendPrint=null;cpPanel=null;cpId=null;colorSpot.clear();linkHighlight=null;renderSW();if(hadSpot||hadLink){renderBoard();renderTbar();}}

function setFS(cardId,val){
  const c=C().find(x=>x.id===cardId);if(!c)return;
  c.fs=Math.min(48,Math.max(10,parseInt(val)||14));
  const el=document.querySelector(`.st[data-id="${cardId}"]`);
  if(el)el.style.fontSize=c.fs+'px';
  sched();
}

function render(){renderPbar();renderTbar();renderSW();renderBoard();renderLimbo();}

function renderPbar(){
  const bar=document.getElementById('pbar');bar.innerHTML='';

  // ── Project info row ──────────────────────────────────────────────────────
  const projRow=document.createElement('div');projRow.className='proj-row';

  // Project name + last saved (read-only)
  const projCenter=document.createElement('div');projCenter.className='proj-center';
  const projName=document.createElement('span');
  if(currentFilePath){
    const fname=currentFilePath.split('/').pop().replace(/\.screenplaycards$/i,'');
    projName.textContent=fname;
    projName.className='proj-name';
    projName.title=currentFilePath;
  } else {
    projName.textContent='Unsaved Project';
    projName.className='proj-name unsaved';
  }
  projCenter.appendChild(projName);
  if(lastSavedAt){
    const ls=document.createElement('span');ls.className='proj-lastsaved';
    const d=new Date(lastSavedAt);
    ls.textContent='Last edited '+d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    projCenter.appendChild(ls);
  }
  projRow.appendChild(projCenter);

  // Writer field
  const writerWrap=document.createElement('div');writerWrap.className='proj-writer-wrap';
  const writerLbl=document.createElement('span');writerLbl.className='proj-writer-lbl';writerLbl.textContent='Written by:';
  const writerInp=document.createElement('input');writerInp.type='text';writerInp.className='proj-writer-inp';
  writerInp.placeholder='writer name(s)';writerInp.value=writer;
  writerInp.addEventListener('mousedown',e=>e.stopPropagation());
  writerInp.addEventListener('input',e=>{writer=e.target.value;sched();});
  writerWrap.appendChild(writerLbl);writerWrap.appendChild(writerInp);
  projRow.appendChild(writerWrap);
  bar.appendChild(projRow);

  // ── Board tabs row ────────────────────────────────────────────────────────
  const boardRow=document.createElement('div');boardRow.className='board-row';
  boards.forEach(p=>{
    const tab=document.createElement('div');
    tab.className='ptab'+(p.id===curB?' active':'');
    const nm=document.createElement('span');nm.className='ptab-name';nm.textContent=p.name;
    nm.addEventListener('mousedown',e=>e.stopPropagation());
    nm.addEventListener('dblclick',()=>{nm.contentEditable='true';nm.focus();const r=document.createRange();r.selectNodeContents(nm);window.getSelection().removeAllRanges();window.getSelection().addRange(r);});
    nm.addEventListener('blur',()=>{if(nm.contentEditable==='true')renameB(p.id,nm);});
    nm.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();nm.blur();}if(e.key==='Escape')nm.blur();});
    tab.appendChild(nm);
    if(boards.length>1){
      const x=document.createElement('span');x.className='ptab-x';x.textContent='✕';x.title='delete board';
      x.addEventListener('click',e=>{e.stopPropagation();reqDelB(p.id);});
      tab.appendChild(x);
    }
    tab.addEventListener('click',e=>{
      if(e.target===nm&&nm.contentEditable==='true')return;
      if(e.target.classList.contains('ptab-x'))return;

    });
    boardRow.appendChild(tab);
  });
  const ab=document.createElement('div');ab.className='padd';ab.textContent='+ board';
  ab.addEventListener('click',addB);boardRow.appendChild(ab);
  bar.appendChild(boardRow);

function renderActBar(){
  const bar=document.getElementById('actbar');if(!bar)return;
  bar.innerHTML='';
  const sections=getActSections();
  if(!sections.length){actFilter.clear();return;}
  const allBtn=document.createElement('button');
  allBtn.className='actbtn'+(actFilter.size===0?' on':'');
  allBtn.textContent='all';
  allBtn.addEventListener('click',()=>{actFilter.clear();renderActBar();renderBoard();});
  bar.appendChild(allBtn);
  sections.forEach(s=>{
    const btn=document.createElement('button');
    btn.className='actbtn'+(actFilter.has(s.label)?' on':'');
    btn.textContent=s.label;
    btn.addEventListener('click',()=>{
      if(actFilter.has(s.label))actFilter.delete(s.label);
      else actFilter.add(s.label);
      if(actFilter.size===sections.length)actFilter.clear();
      renderActBar();renderBoard();
    });
    bar.appendChild(btn);
  });
}

    const sep=document.createElement('span');sep.style.cssText='font-size:11px;color:#b4b2a9';sep.textContent='or duplicate:';d.appendChild(sep);
    const sel=document.createElement('select');sel.style.cssText='font-size:11px;padding:2px 4px;border:0.5px solid #b4b2a9;border-radius:6px;background:#fff;color:#1a1a18;font-family:inherit';

    const lbl=document.createElement('span');lbl.style.cssText='font-size:11px;color:#888780;flex-shrink:0;margin-right:2px';lbl.textContent='border color';d.appendChild(lbl);

        const nm=document.createElement('span');nm.style.cssText='flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';nm.textContent=o.title||'untitled';item.appendChild(nm);

        list.appendChild(item);

    const c=cpId!==null?C().find(x=>x.id===cpId):null;
    const d=document.createElement('div');d.className='astrip';
    const lbl=document.createElement('span');lbl.style.cssText='font-size:11px;color:#888780;flex-shrink:0';lbl.textContent='fill color';d.appendChild(lbl);
    if(!c){
      const hint=document.createElement('span');hint.style.cssText='font-size:11px;color:#888780';
      hint.textContent='click ■ on a card to set its fill color';d.appendChild(hint);
    } else {
      COLORS.forEach(cl=>{
        const s=document.createElement('span');s.className='csw';
        s.title=(cl.h&&L()[cl.k])?L()[cl.k]:cl.k;
        if(cl.h)s.style.background=cl.h;else{s.style.background='#fff';s.style.borderColor='#b4b2a9';}

        if(sel)s.style.outline='2px solid #1a1a18';
        s.addEventListener('click',()=>setBgColor(cpId,cl.k));
        d.appendChild(s);

      const sep=document.createElement('span');sep.style.cssText='color:#d3d1c7;margin:0 4px';sep.textContent='|';d.appendChild(sep);

function renumber(){let sn=1;C().forEach(c=>{if(c.nocount)c.sn=null;else c.sn=sn++;});}

function renderBoard(){
  renumber();
  const b=document.getElementById('board');
  const sections=getActSections();
  const visibleIds=actFilter.size===0?null:(()=>{
    const ids=new Set();
    sections.filter(s=>actFilter.has(s.label)).forEach(s=>s.ids.forEach(id=>ids.add(id)));
    return ids;
  })();

  b.className=view==='list'?'clist':'cgrid'+(selMode?' selmode':'');b.innerHTML='';
  let _actCollapsed=false;
  C().forEach((c,i)=>{
    if(visibleIds&&!visibleIds.has(c.id))return;
    if(isActHeader(c)){_actCollapsed=collapsedActs.has(c.id);}
    else if(_actCollapsed)return;
    b.appendChild(view==='list'?makeLRow(c,i):makeCrd(c,i));
  });

  const cnt=document.getElementById('cnt');
  if(cnt)cnt.textContent=countedScenes().length+' scene'+(countedScenes().length===1?'':'s');
  const ub=document.getElementById('ub');
  if(ub){const h=hist.some(x=>x.board===curB);ub.style.opacity=h?1:0.4;ub.style.pointerEvents=h?'auto':'none';}
  applyFit();applyFlow();
}

function attachEditable(el,wrap){
  el.addEventListener('mousedown',()=>{wrap.draggable=false;});
  el.addEventListener('focus',()=>{
    const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    el.style.caretColor=dark?(el.classList.contains('st')?'#e8e6e0':'#b4b2a9'):'';
  });

  el.addEventListener('blur',()=>{wrap.draggable=true;});
  el.addEventListener('input',e=>{
    const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    if(dark) el.style.caretColor=el.classList.contains('st')?'#e8e6e0':'#b4b2a9';
    onEdit(e);
  });
  el.addEventListener('keydown',e=>{
    if(e.key==='Tab'){
      e.preventDefault();
      const id=parseInt(el.dataset.id);
      if(!isNaN(id))insertCardAfter(id);
    }
  });
}


function makeCrd(c,i){
  const w=document.createElement('div');
  w.className='cwrap'+(flipped?' flipped':'')+(selectedCards.has(c.id)?' selected':'')+(linkHighlight&&(c.id===linkHighlight||(C().find(x=>x.id===linkHighlight)&&(C().find(x=>x.id===linkHighlight).links||[]).includes(c.id)))?' link-hi':'');w.dataset.idx=i;w.dataset.cid=c.id;w.draggable=true;
  w.addEventListener('dragstart',function(e){dsrc=this;this.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  w.addEventListener('dragover',e=>{e.preventDefault();clearDO();w.classList.add('drag-over');});
  w.addEventListener('drop',onDrop);
  w.addEventListener('dragend',()=>{clearDO();document.querySelectorAll('.cwrap').forEach(e=>e.classList.remove('dragging'));dsrc=null;});
  const colors=c.colors||(c.color&&c.color!=='none'?[c.color]:[]);
  const bgHex=cHex(c.bgColor);
  const tc=textColor(bgHex);
  const cs=bgHex?`background:${bgHex};`:'';
  const ds=colorDotStyle(colors);
  const bds=bgHex?`background:${bgHex};outline:2px solid ${tc||'#1a1a18'};border-color:transparent;`:'';
  const ts=tc?`color:${tc};`:'';
  const cbar=makeColorBar(colors);
  const notesRaw=(c.notes||'').replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').split(/\s+/).join(' ').trim();
  const notePrev=showPrev&&notesRaw?'<div class="note-prev">'+esc(notesRaw)+'</div>':'';
  const actArrow=isActHeader(c)?'<span class="act-arrow'+(collapsedActs.has(c.id)?' collapsed':'')+'" data-act-id="'+c.id+'">&#9660;</span>':'';
  const linkCnt=(c.links||[]).length;

  const selChkHtml='<span class="sel-chk" data-selid="'+c.id+'">'+(selectedCards.has(c.id)?'&#10003;':'')+'</span>';
  w.innerHTML='<div class="ci">'
    +'<div class="cf'+(bgHex?' filled':'')+'" style="'+cs+'">'
    +selChkHtml
    +cbar
    +'<div class="sn" style="'+ts+'"><span class="sntog'+(c.nocount?' excluded':'')+'" title="'+(c.nocount?'click to restore scene number':'click to exclude from numbering')+'">'+(c.nocount?'\u2014':'SC. '+c.sn)+'</span>'+actArrow+linkBadge+'<button class="dupeb" style="font-size:9px;padding:0 3px;background:transparent;border:none;color:#b4b2a9;'+ts+'" title="duplicate">⎘</button><span class="cdot" style="'+ds+'" title="accent colors"></span></div>'
    +'<div class="st" contenteditable spellcheck="true" data-id="'+c.id+'" data-field="title" style="font-size:'+getFS(c)+';'+ts+'">'+esc(c.title)+'</div>'
    +notePrev
    +'<div class="ca">'
    +'<span class="fsdot"><button class="fsdot-btn fsdot-dn" title="decrease font size">&#8249;</button><span class="fsdot-num" style="background:'+(bgHex||'transparent')+';'+(tc?'color:'+tc+';':'')+'">'+(c.fs||14)+'</span><button class="fsdot-btn fsdot-up" title="increase font size">&#8250;</button></span>'
    +'<span class="spacer"></span>'
    +'<span class="bgsw" style="'+bds+'" title="fill color"></span>'
    +'<button class="fbc" style="'+ts+'">notes</button>'
    +'<button class="linkbtn" style="'+ts+'">link</button>'
    +'<button class="xb" style="'+ts+'">✕</button>'
    +'</div>'
    +'</div>'
    +'<div class="cf bk" style="'+cs+'">'
    +cbar
    +'<div class="bl" style="'+ts+'">'+(c.nocount?esc(c.title):'SC. '+c.sn+' \u2014 notes')+'</div>'
    +'<div class="bn" contenteditable spellcheck="true" data-id="'+c.id+'" data-field="notes">'+(c.notes||'')+'</div>'
    +'<div class="ca"><span class="spacer"></span><button class="fbc" style="'+ts+'">front</button></div>'
    +'</div>'
    +'</div>';
  const titleEl=w.querySelector('.st');
  const notesEl=w.querySelector('.bn');
  attachEditable(titleEl,w);
  attachEditable(notesEl,w);
  w.querySelector('.sntog').addEventListener('click',e=>{e.stopPropagation();pushH();c.nocount=!c.nocount;sched();renderActBar();renderBoard();});
  w.querySelector('.cdot').addEventListener('click',e=>{e.stopPropagation();openCP(c.id,'border');});
  w.querySelector('.bgsw').addEventListener('click',e=>{e.stopPropagation();openCP(c.id,'bg');});
  w.querySelectorAll('.fbc').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();w.classList.toggle('flipped');}));
  w.querySelector('.dupeb').addEventListener('click',e=>{e.stopPropagation();duplicateCard(c.id);});
  const lb=w.querySelector('.limbob');if(lb)lb.addEventListener('click',e=>{e.stopPropagation();moveToLimbo(c.id);});
  const aa=w.querySelector('.act-arrow');if(aa)aa.addEventListener('click',e=>{e.stopPropagation();toggleActCollapse(c.id);});
  const sc=w.querySelector('.sel-chk');if(sc)sc.addEventListener('click',e=>{e.stopPropagation();toggleCardSel(c.id);});
  const lkbtn=w.querySelector('.linkbtn');if(lkbtn)lkbtn.addEventListener('click',e=>{e.stopPropagation();openCP(c.id,'link');});
  const lbadge=w.querySelector('.link-badge');if(lbadge)lbadge.addEventListener('click',e=>{e.stopPropagation();setLinkHighlight(c.id);});
  w.addEventListener('click',e=>{if(selMode&&e.target===w)toggleCardSel(c.id);});
  w.querySelector('.xb').addEventListener('click',e=>{e.stopPropagation();reqDel(c.id);});
  const fsdot=w.querySelector('.fsdot');
  if(fsdot){
    function applyFS(delta){
      const card=C().find(x=>x.id===c.id);if(!card)return;
      setFS(c.id,(card.fs||14)+delta);
      const num=fsdot.querySelector('.fsdot-num');
      if(num){
        num.textContent=card.fs||14;
        num.style.background=cHex(card.bgColor)||'transparent';
        num.style.color=textColor(cHex(card.bgColor))||'';
      }
    }
    function addHoldBehavior(btn,delta){
      let holdTimer=null,holdInterval=null;
      btn.addEventListener('mousedown',e=>{
        e.stopPropagation();
        applyFS(delta);
        holdTimer=setTimeout(()=>{holdInterval=setInterval(()=>applyFS(delta),80);},400);
      });
      const cancel=()=>{clearTimeout(holdTimer);clearInterval(holdInterval);holdTimer=null;holdInterval=null;};
      btn.addEventListener('mouseup',cancel);
      btn.addEventListener('mouseleave',cancel);
    }
    addHoldBehavior(fsdot.querySelector('.fsdot-up'),1);
    addHoldBehavior(fsdot.querySelector('.fsdot-dn'),-1);
  }
  return w;
}

function onEdit(e){
  const el=e.target,id=parseInt(el.dataset.id),field=el.dataset.field;
  const c=C().find(x=>x.id===id);if(!c)return;
  pushCH(id);
  c[field]=(field==='notes')?el.innerHTML:el.innerText.trim();
  if(c.nocount&&field==='title')renderActBar();
  sched();
}

function onDrop(e){
  e.preventDefault();clearDO();
  if(!dsrc||dsrc===this)return;
  const from=parseInt(dsrc.dataset.idx),to=parseInt(this.dataset.idx);
  if(isNaN(from)||isNaN(to))return;
  pushH();const moved=C().splice(from,1)[0];C().splice(to,0,moved);sched();renderBoard();
}

function flipAll(){
  flipped=!flipped;
  const b=document.getElementById('fb');if(b)b.textContent=flipped?'flip to front':'flip all';
  document.querySelectorAll('.cwrap').forEach(el=>el.classList.toggle('flipped',flipped));
}

function setView(v){view=v;renderTbar();renderBoard();}

function toggleFlow(){
  colFlow=!colFlow;
  const btn=document.getElementById('flowbtn');
  if(btn)btn.textContent=colFlow?'→ rows':'↓ cols';
  renderBoard();
}

function applyFlow(){
  const b=document.getElementById('board');
  if(!b||view==='list')return;
  if(colFlow){
    const rows=Math.ceil(Math.sqrt(C().length*0.6));
    b.style.gridAutoFlow='column';
    b.style.gridTemplateRows=`repeat(${Math.max(rows,1)},160px)`;
    b.style.gridTemplateColumns='';
    b.style.gridAutoColumns='minmax(200px,1fr)';
  } else {
    b.style.gridAutoFlow='';
    b.style.gridTemplateRows='';
    b.style.gridTemplateColumns='';
    b.style.gridAutoColumns='';
  }
}

function toggleFit(){
  fitMode=!fitMode;
  const btn=document.getElementById('fitbtn');
  if(btn)btn.textContent=fitMode?'exit fit':'fit all';
  if(!fitMode){
    const b=document.getElementById('board');
    b.style.zoom='';
    b.style.gridTemplateColumns='';
    zoomLevel=100;
    const sl=document.getElementById('zslider');const zv=document.getElementById('zval');
    if(sl)sl.value=100;if(zv)zv.textContent='100%';
  } else {
    applyFit();
  }
}

function applyFit(){
  const b=document.getElementById('board');
  if(!fitMode||view==='list'||!C().length){b.style.zoom='';b.style.gridTemplateColumns='';return;}
  const n=C().length;
  const vw=window.innerWidth-48;
  const tbar=document.getElementById('tbar');
  const pbar=document.getElementById('pbar');
  const sw=document.getElementById('sw');
  const usedH=(tbar?tbar.offsetHeight:50)+(pbar?pbar.offsetHeight:40)+(sw?sw.offsetHeight:0)+64;
  const availH=window.innerHeight-usedH;
  const cardW=212;
  const cardH=172;
  let bestZoom=0;
  let bestCols=1;
  for(let cols=1;cols<=n;cols++){
    const rows=Math.ceil(n/cols);
    const zw=vw/(cols*cardW);
    const zh=availH/(rows*cardH);
    const z=Math.min(zw,zh,1);
    if(z>bestZoom){bestZoom=z;bestCols=cols;}
  }
  b.style.gridTemplateColumns=`repeat(${bestCols},1fr)`;
  b.style.zoom=bestZoom;
  zoomLevel=Math.round(bestZoom*100);
  const sl=document.getElementById('zslider');const zv=document.getElementById('zval');
  if(sl)sl.value=zoomLevel;if(zv)zv.textContent=zoomLevel+'%';
}

function toggleFS(){
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    const el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  } else {
    if(document.exitFullscreen)document.exitFullscreen();
    else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
  }
}
function updateFSBtn(){
  const btn=document.getElementById('fscrn');
  if(!btn)return;
  const isFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
  btn.textContent=isFS?'\u2715':'\u26f6';
  btn.title=isFS?'exit fullscreen':'fullscreen';
}
document.addEventListener('fullscreenchange',updateFSBtn);
window.addEventListener('resize',()=>{if(fitMode)applyFit();});
document.addEventListener('webkitfullscreenchange',updateFSBtn);

document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.shiftKey&&e.key==='z'){e.preventDefault();redo();return;}
  if((e.metaKey||e.ctrlKey)&&e.key==='z'){e.preventDefault();undo();return;}
  if((e.metaKey||e.ctrlKey)&&e.key==='y'){e.preventDefault();redo();return;}
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();addCard();}
  if(e.key==='Escape'){if(selMode&&selectedCards.size>0){clearSelection();return;}cancel();return;}
  if(selMode&&(e.metaKey||e.ctrlKey)&&e.key==='a'){e.preventDefault();C().forEach(c=>selectedCards.add(c.id));renderBoard();renderTbar();renderSW();return;}
  if(e.key==='Enter'&&pend){e.preventDefault();pend.type==='card'?doDel():doDelB(pend.id);}
});


function exportData(){
  const payload=JSON.stringify({p:boards,c:curB,b:byB,n:nid,l:legByB},null,2);
  const blob=new Blob([payload],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const proj=boards.find(x=>x.id===curB);
  const name=(proj?proj.name.replace(/[^a-z0-9]/gi,'-').toLowerCase():'project')+'-'+new Date().toISOString().slice(0,10);
  a.href=url;a.download=name+'.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.addEventListener('change',e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.p||!d.b)throw new Error('invalid');
        boards=d.p;curB=d.c;byB=d.b;nid=d.n||1;legByB=d.l||{};
        hist=[];actFilter.clear();colorSpot.clear();cpPanel=null;cpId=null;
        Object.values(byB).forEach(arr=>{if(Array.isArray(arr))arr.forEach(migrateColors);});
        sched();render();
      }catch(err){alert('Could not read that file. Make sure it is a screenplay cards export.');}
    };
    reader.readAsText(file);
  });
  inp.click();
}

function printOutline(boardId=curB){
  const projTitle=currentFilePath?currentFilePath.split('/').pop().replace(/\.screenplaycards$/i,''):'Untitled';

  const sections=getActSectionsForBoard(boardId);
  const boardCards=byB[boardId]||[];
  const visibleIds=actFilter.size===0?null:(()=>{
    const ids=new Set();
    sections.filter(s=>actFilter.has(s.label)).forEach(s=>s.ids.forEach(id=>ids.add(id)));
    return ids;
  })();
  const filterLabel=actFilter.size>0?(' — '+Array.from(actFilter).join(', ')):'';

  let body='';
  boardCards.forEach(c=>{
    if(visibleIds&&!visibleIds.has(c.id))return;
    if(isActHeader(c)){
      body+='<div class="act">'+esc(c.title||'')+'</div>';
      return;

    legendHtml+='<div class="leg-section"><div class="leg-title">Color Legend</div><div class="leg-grid">';
    legendColors.forEach(cl=>{
      const label=leg[cl.k]?esc(leg[cl.k]):cl.k;
      legendHtml+=`<div class="leg-item"><span class="leg-dot" style="background:${cl.h}"></span><span class="leg-name">${label}</span></div>`;
    });
    legendHtml+='</div></div>';
  }

  const html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+esc(projTitle)+'</title>'
    +'<style>'
    +'body{font-family:Georgia,serif;max-width:680px;margin:48px auto;padding:0 24px;color:#1a1a18;line-height:1.6}'
    +'h1{font-size:22px;font-weight:700;margin:0 0 2px}'
    +'.board-name{font-size:14px;color:#888;margin:0 0 6px}'
    +'.writer-line{font-size:13px;color:#1a1a18;border-bottom:0.5px solid #ccc;padding-bottom:2px;margin-bottom:4px;min-width:180px;display:inline-block}'
    +'.writer-label{font-size:12px;color:#888;margin-bottom:32px}'
    +'.act{font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#888;margin:36px 0 16px;padding-bottom:6px;border-bottom:1px solid #e0ddd8}'
    +'.scene{margin-bottom:22px}'
    +'.scene-head{display:flex;gap:10px;align-items:baseline}'
    +'.scene-num{font-size:12px;color:#888780;font-family:-apple-system,sans-serif;font-weight:600;min-width:48px;flex-shrink:0;padding-top:3px}'
    +'.scene-title{font-size:16px;font-weight:600}'
    +'.scene-notes{font-size:14px;color:#444;margin-top:4px;padding-left:48px;line-height:1.6}'
    +'.scene-notes>div,.scene-notes>p{margin:0}'
    +'.leg-section{margin-top:48px;padding-top:20px;border-top:2px solid #e0ddd8}'
    +'.leg-title{font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#888;margin-bottom:14px}'
    +'.leg-grid{display:flex;flex-wrap:wrap;gap:10px 24px}'

    const w=window.open('','_blank');
    if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),400);}
  }
}

doLoad();

if(window.electronAPI){
  window.electronAPI.on('app:file-opened',({data,filePath})=>{
    currentFilePath=filePath;
    loadFromData(data);
  });
  window.electronAPI.on('app:check-dirty',()=>{
    if(!isDirty){window.electronAPI.closeConfirmed();return;}
    const board=boards.find(b=>b.id===curB);
    const name=(board&&board.name)||'Untitled';
    if(confirm('Save changes to "'+name+'" before closing?')){
      handleSave().then(()=>window.electronAPI.closeConfirmed());
    } else {
      window.electronAPI.closeConfirmed();
    }
  });
  window.electronAPI.on('app:check-dirty-then-new',()=>checkDirtyThen(()=>startFreshProject()));
  window.electronAPI.on('app:check-dirty-then-open',(filePath)=>checkDirtyThen(()=>window.electronAPI.fileOpenPath(filePath)));
  window.electronAPI.on('app:open-cancelled',()=>{
    const overlay=document.getElementById('welcome-overlay');
    if(overlay&&overlay.classList.contains('hidden')&&!currentFilePath){showWelcomePanel();}
  });
  window.electronAPI.on('app:save',()=>handleSave());
  window.electronAPI.on('app:save-as',()=>handleSaveAs());
  window.electronAPI.on('app:undo',()=>undo());window.electronAPI.on('app:redo',()=>redo());
  window.electronAPI.on_contextAction(action=>{
    if(action==='undo'){undo();return;}
    const ae=document.activeElement;
    if(ae&&ae.dataset&&ae.dataset.field==='notes'){
      const id=parseInt(ae.dataset.id);
      document.execCommand(action,false,null);
      ae.dispatchEvent(new Event('input',{bubbles:true}));
    }
  });
  window.electronAPI.on('app:new-card',()=>addCard());
  window.electronAPI.on('app:flip-all',()=>flipAll());
  window.electronAPI.on('app:fit-all',()=>toggleFit());
  window.electronAPI.on('app:set-view',(v)=>setView(v));
  window.electronAPI.on('app:print-outline',()=>showPrintPicker('outline'));
  window.electronAPI.on('app:print-beats',()=>showPrintPicker('beats'));
  window.electronAPI.on('app:print-summary',()=>showPrintPicker('summary'));
}

</script>
</body>
</html>
